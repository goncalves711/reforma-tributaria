<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Diagnóstico — Reforma Tributária</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul:        #005EB8;
      --azul-esc:    #003F7F;
      --azul-med:    #0089CF;
      --azul-bg:     #EBF4FB;
      --cinza-bg:    #F4F6F9;
      --cinza-bd:    #DDE3EC;
      --cinza-txt:   #6B7A90;
      --texto:       #1A2332;
      --branco:      #FFFFFF;
      --verde:       #00884A;
      --verde-bg:    #E6F4EE;
      --verde-bd:    rgba(0,136,74,0.2);
      --amarelo:     #D07B00;
      --amarelo-bg:  #FEF5E7;
      --amarelo-bd:  rgba(208,123,0,0.25);
      --vermelho:    #C0001A;
      --vermelho-bg: #FDECEA;
      --vermelho-bd: rgba(192,0,26,0.2);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cinza-bg);
      color: var(--texto);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      background: var(--azul);
      padding: 1.5rem 1.25rem 1.75rem;
      text-align: center;
    }

    .logo-badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 1rem;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: rgba(255,255,255,0.78);
      line-height: 1.5;
    }

    /* ── PROGRESS ── */
    .progress-wrap {
      background: var(--azul-esc);
      padding: 10px 1.25rem;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.65);
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #fff;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── CONTAINER ── */
    .container {
      padding: 1rem 1rem 5rem;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--branco);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 1px 6px rgba(0,50,100,0.08);
      animation: fadeUp 0.25s ease both;
    }

    /* ── TELA DADOS ── */
    .dados-topo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 1.25rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--cinza-bd);
    }

    .dados-icone {
      width: 42px; height: 42px;
      background: var(--azul-bg);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .dados-topo h2 { font-size: 16px; font-weight: 700; }
    .dados-topo p  { font-size: 12px; color: var(--cinza-txt); margin-top: 2px; }

    .form-group { margin-bottom: 1rem; }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--cinza-txt);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      background: var(--cinza-bg);
      border: 1.5px solid var(--cinza-bd);
      border-radius: 10px;
      padding: 13px 14px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--texto);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    .form-group input:focus {
      border-color: var(--azul);
      box-shadow: 0 0 0 3px rgba(0,94,184,0.1);
      background: #fff;
    }

    .form-group input::placeholder { color: #B0BAC8; }

    /* ── PERGUNTA ── */
    .q-num {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--azul-med);
      margin-bottom: 6px;
    }

    .q-label {
      font-size: 17px;
      font-weight: 700;
      color: var(--texto);
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .q-sub {
      font-size: 13px;
      color: var(--cinza-txt);
      line-height: 1.5;
      padding: 10px 12px;
      background: var(--azul-bg);
      border-left: 3px solid var(--azul-med);
      border-radius: 0 8px 8px 0;
      margin-bottom: 1.25rem;
    }

    /* ── OPÇÕES ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 0.25rem;
    }

    .opt {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--cinza-bg);
      border: 1.5px solid var(--cinza-bd);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .opt:active { transform: scale(0.98); }

    .opt.selected {
      background: var(--azul-bg);
      border-color: var(--azul);
    }

    .opt-radio {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--cinza-bd);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: #fff;
      transition: all 0.15s;
    }

    .opt.selected .opt-radio {
      border-color: var(--azul);
      background: var(--azul);
    }

    .opt.selected .opt-radio::after {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #fff;
    }

    .opt-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--texto);
      line-height: 1.4;
      flex: 1;
    }

    .opt.selected .opt-text { color: var(--azul-esc); font-weight: 600; }

    /* ── BOTÕES ── */
    .nav { display: flex; gap: 10px; margin-top: 1.5rem; }

    button {
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none; outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-back {
      padding: 13px 16px;
      background: transparent;
      border: 1.5px solid var(--cinza-bd);
      border-radius: 12px;
      color: var(--cinza-txt);
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .btn-next {
      flex: 1;
      padding: 14px;
      background: var(--azul);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .btn-next:active { background: var(--azul-esc); transform: scale(0.98); }
    .btn-next:disabled { opacity: 0.35; pointer-events: none; }

    /* ── LOADING ── */
    .loading-state {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      padding: 2.5rem 1rem; text-align: center;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--cinza-bd);
      border-top-color: var(--azul);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-state strong { font-size: 15px; font-weight: 700; }
    .loading-state p { font-size: 13px; color: var(--cinza-txt); }

    /* ── RESULTADO ── */
    .saved-ok {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600;
      color: var(--verde);
      background: var(--verde-bg);
      border: 1px solid var(--verde-bd);
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 1.25rem;
    }

    .veredito {
      border-radius: 14px;
      padding: 1.5rem 1.25rem;
      text-align: center;
      margin-bottom: 1.25rem;
    }

    .veredito.ALTO   { background: var(--vermelho-bg); border: 1.5px solid var(--vermelho-bd); }
    .veredito.MEDIO  { background: var(--amarelo-bg);  border: 1.5px solid var(--amarelo-bd); }
    .veredito.BAIXO  { background: var(--verde-bg);    border: 1.5px solid var(--verde-bd); }

    .veredito-emoji { font-size: 40px; margin-bottom: 10px; line-height: 1; }

    .veredito-nivel {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 8px;
    }

    .ALTO  .veredito-nivel { color: var(--vermelho); }
    .MEDIO .veredito-nivel { color: var(--amarelo); }
    .BAIXO .veredito-nivel { color: var(--verde); }

    .veredito-resumo {
      font-size: 16px; font-weight: 700;
      color: var(--texto); line-height: 1.4;
    }

    .veredito-score {
      display: inline-block;
      margin-top: 10px;
      font-size: 12px; font-weight: 600;
      color: var(--cinza-txt);
      background: rgba(255,255,255,0.75);
      padding: 3px 12px; border-radius: 100px;
    }

    .diag-titulo {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--cinza-txt);
      margin-bottom: 12px;
    }

    .diag-texto {
      font-size: 14px;
      color: #3A4A5C;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .divider { height: 1px; background: var(--cinza-bd); margin: 1.25rem 0; }

    .btn-restart {
      width: 100%; padding: 13px;
      background: var(--cinza-bg);
      border: 1.5px solid var(--cinza-bd);
      border-radius: 12px;
      color: var(--cinza-txt);
      font-size: 14px; font-weight: 600;
      margin-top: 1.25rem;
    }

    .btn-restart:active { background: var(--cinza-bd); }

    /* ── ERRO ── */
    .erro-box {
      padding: 1.25rem; text-align: center;
    }
    .erro-box p { font-size: 14px; color: var(--vermelho); margin-bottom: 1rem; font-weight: 500; }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/goncalves711/reforma-tributaria/main/logo%20sebrae.jpg"
       alt="Sebrae" style="height:52px;margin-bottom:1rem;border-radius:6px;" />
  <h1>Sua empresa precisa<br>agir agora?</h1>
  <p>10 perguntas · 3 minutos · resultado na hora</p>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="step-label">Identificação</span>
    <span id="step-count"></span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="prog" style="width:0%"></div>
  </div>
</div>

<div class="container">
  <div class="card">
    <div id="form-area"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const supabase = createClient(
  'https://duuavlthmjnmaxixrtwi.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1dWF2bHRobWpubWF4aXhydHdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwODYzMjksImV4cCI6MjA5MzY2MjMyOX0.lNbuDtPcOiG2oYPL7C8U9gzGz3tPymPu3MlHUVVRd38'
)

// ── PERGUNTAS ───────────────────────────────────────────────
const STEPS = [
  // P1 — Regime: gatilho automático para vermelho
  { id:'regime', label:'Qual é o regime tributário atual da sua empresa?',
    opts:[
      { v:'mei',             t:'MEI' },
      { v:'simples',         t:'Simples Nacional' },
      { v:'lucro_presumido', t:'Lucro Presumido' },
      { v:'lucro_real',      t:'Lucro Real' },
      { v:'nao_sei',         t:'Não sei' },
    ]},

  // P2 — Para quem vende
  { id:'vende_para', label:'Para quem sua empresa vende mais?',
    opts:[
      { v:'pf',       t:'Principalmente para consumidor final pessoa física' },
      { v:'misto',    t:'Para pessoa física e CNPJ, meio a meio' },
      { v:'pj',       t:'Principalmente para empresas (CNPJ)' },
      { v:'pj_grande',t:'Principalmente para empresas grandes ou contribuintes do regime normal' },
    ]},

  // P3 — Clientes pedem informações fiscais
  { id:'cliente_fiscal', label:'Seus clientes costumam pedir informações fiscais, destaque de imposto ou crédito tributário?',
    opts:[
      { v:'nunca',       t:'Nunca' },
      { v:'as_vezes',    t:'Às vezes' },
      { v:'frequente',   t:'Frequentemente' },
      { v:'nao_sei',     t:'Não sei' },
    ]},

  // P4 — Compras de insumos
  { id:'compras_insumos', label:'Sua empresa compra muitos insumos, mercadorias ou serviços para conseguir vender?',
    opts:[
      { v:'nao',         t:'Não, meu custo principal é mão de obra ou atividade pessoal' },
      { v:'pouco',       t:'Sim, mas o custo é baixo em relação ao faturamento' },
      { v:'bastante',    t:'Sim, compro bastante mercadoria, insumo ou serviço' },
      { v:'grande_parte',t:'Sim, minhas compras representam grande parte do preço final' },
    ]},

  // P5 — Segmento
  { id:'segmento', label:'Qual é o segmento principal da empresa?',
    opts:[
      { v:'servico_pf',  t:'Serviço simples para pessoa física' },
      { v:'comercio_pf', t:'Comércio varejista para consumidor final' },
      { v:'servico_pj',  t:'Serviço para empresas (B2B)' },
      { v:'industria',   t:'Indústria' },
      { v:'atacado',     t:'Atacado ou distribuição' },
      { v:'construcao',  t:'Construção, incorporação ou atividade imobiliária' },
      { v:'especifico',  t:'Restaurante, alimentação, saúde, educação ou setor com regra específica' },
    ]},

  // P6 — Margens
  { id:'margem', label:'Sua empresa trabalha com margens apertadas?',
    opts:[
      { v:'nao',      t:'Não, tenho boa margem' },
      { v:'sim',      t:'Sim, minha margem é pequena' },
      { v:'nao_sei',  t:'Não sei calcular minha margem' },
      { v:'variavel', t:'Vario muito de produto para produto ou de contrato para contrato' },
    ]},

  // P7 — Contratos longos
  { id:'contratos', label:'Sua empresa tem contratos de venda ou prestação de serviço com prazo médio ou longo?',
    opts:[
      { v:'nao',        t:'Não' },
      { v:'sim_flexivel',t:'Sim, mas consigo reajustar preço com facilidade' },
      { v:'sim_medio',  t:'Sim, contratos de 6 a 12 meses' },
      { v:'sim_longo',  t:'Sim, contratos acima de 12 meses ou com preço travado' },
    ]},

  // P8 — Cláusula de reequilíbrio
  { id:'clausula', label:'Seus contratos atuais têm cláusula de reequilíbrio econômico por mudança tributária?',
    sub:'Contratos sem essa cláusula podem gerar prejuízo se a carga tributária mudar.',
    opts:[
      { v:'sim',      t:'Sim' },
      { v:'nao',      t:'Não' },
      { v:'nao_sei',  t:'Não sei' },
      { v:'sem_cont', t:'Não tenho contratos formais' },
    ]},

  // P9 — Limite do Simples
  { id:'limite_simples', label:'Sua empresa está próxima dos limites do Simples Nacional?',
    sub:'Empresas próximas dos limites precisam simular permanência no Simples ou migração.',
    opts:[
      { v:'longe',    t:'Não, fatura bem abaixo dos limites' },
      { v:'crescendo',t:'Está crescendo, mas ainda longe dos limites' },
      { v:'proximo_36',t:'Está próxima de R$ 3,6 milhões por ano' },
      { v:'proximo_48',t:'Está próxima de R$ 4,8 milhões por ano' },
      { v:'nao_sei',  t:'Não sei' },
      { v:'na',       t:'Não estou no Simples' },
    ]},

  // P10 — IBS/CBS dentro ou fora do Simples
  { id:'ibs_simples', label:'Você sabe se, em 2027, sua empresa deve recolher IBS/CBS dentro do Simples ou pelo regime regular?',
    sub:'Essa escolha pode afetar preço, crédito para clientes e competitividade.',
    opts:[
      { v:'sim',        t:'Sim, já analisei com contador ou consultor' },
      { v:'ainda_nao',  t:'Ainda não analisei' },
      { v:'nem_sabia',  t:'Nem sabia que existia essa opção' },
      { v:'nao_simples',t:'Minha empresa não é do Simples' },
    ]},

  // P11 — Já conversou com contador
  { id:'contador', label:'Você já conversou com seu contador sobre os impactos da Reforma Tributária?',
    opts:[
      { v:'sim_simulacao', t:'Sim, já tenho simulação' },
      { v:'sim_sem_num',   t:'Já conversei, mas ainda sem números' },
      { v:'ainda_nao',     t:'Ainda não conversei' },
      { v:'sem_contador',  t:'Não tenho contador ou não sei quem pode ajudar' },
    ]},
]

// ── ESTADO ──────────────────────────────────────────────────
let userData = {}, answers = {}, history = [], idx = -1

function activeSteps() {
  return STEPS.filter(s => !s.condition || s.condition(answers))
}

// ── PROGRESSO ───────────────────────────────────────────────
function updateProg() {
  const steps = activeSteps(), total = steps.length, cur = idx + 1
  document.getElementById('prog').style.width = Math.round(cur/total*100) + '%'
  const s = steps[idx]
  document.getElementById('step-label').textContent = s ? `Pergunta ${cur} de ${total}` : 'Identificação'
  document.getElementById('step-count').textContent  = s ? `${cur}/${total}` : ''
}

// ── RENDER DADOS ─────────────────────────────────────────────
function renderDados() {
  document.getElementById('prog').style.width = '0%'
  document.getElementById('step-label').textContent = 'Identificação'
  document.getElementById('step-count').textContent = ''
  document.getElementById('form-area').innerHTML = `
    <div class="dados-topo">
      <div class="dados-icone">
        <svg width="20" height="20" fill="none" stroke="#005EB8" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div>
        <h2>Antes de começar</h2>
        <p>Preencha seus dados para salvar o diagnóstico</p>
      </div>
    </div>
    <div class="form-group">
      <label>Seu nome</label>
      <input type="text" id="inp-nome" placeholder="Ex: João Silva" autocomplete="name" />
    </div>
    <div class="form-group">
      <label>Nome da empresa</label>
      <input type="text" id="inp-empresa" placeholder="Ex: Empresa Ltda." autocomplete="organization" />
    </div>
    <div class="form-group">
      <label>WhatsApp ou e-mail</label>
      <input type="text" id="inp-contato" placeholder="(85) 99999-0000 ou email@empresa.com" autocomplete="email" />
    </div>
    <div class="nav">
      <button class="btn-next" onclick="startQuiz()">
        Iniciar diagnóstico
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  `
}

// ── RENDER PERGUNTA ──────────────────────────────────────────
function renderQ() {
  const steps = activeSteps(), s = steps[idx]
  if (!s) return
  updateProg()
  const num = idx + 1
  let html = `<div class="q-num">Pergunta ${num}</div>`
  html += `<div class="q-label">${s.label}</div>`
  if (s.sub) html += `<div class="q-sub">${s.sub}</div>`
  else html += `<div style="margin-bottom:1.25rem"></div>`
  html += `<div class="options">`
  s.opts.forEach(o => {
    const sel = answers[s.id] === o.v ? 'selected' : ''
    html += `<div class="opt ${sel}" onclick="pick('${s.id}','${o.v}',this)">
      <div class="opt-radio"></div>
      <span class="opt-text">${o.t}</span>
    </div>`
  })
  html += `</div><div class="nav">`
  html += `<button class="btn-back" onclick="back()">← Voltar</button>`
  const isLast = idx === steps.length - 1
  html += `<button class="btn-next" id="btn-next" onclick="${isLast?'finish()':'next()'}" ${answers[s.id]!==undefined?'':'disabled'}>
    ${isLast ? 'Ver resultado' : 'Próxima'}
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button></div>`
  document.getElementById('form-area').innerHTML = html
}

// ── AÇÕES ────────────────────────────────────────────────────
window.startQuiz = () => {
  const nome    = document.getElementById('inp-nome').value.trim()
  const empresa = document.getElementById('inp-empresa').value.trim()
  const contato = document.getElementById('inp-contato').value.trim()
  if (!nome || !empresa || !contato) { alert('Preencha todos os campos.'); return }
  userData = { nome, empresa, contato }
  idx = 0; history = []
  renderQ()
}

window.pick = (id, val, el) => {
  answers[id] = val
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'))
  el.classList.add('selected')
  const btn = document.getElementById('btn-next')
  if (btn) btn.disabled = false
}

window.next = () => {
  const steps = activeSteps(), s = steps[idx]
  if (!s || answers[s.id] === undefined) return
  history.push(idx)
  idx++
  if (idx >= steps.length) { finish(); return }
  renderQ()
}

window.back = () => {
  if (history.length === 0) { idx = -1; renderDados(); return }
  idx = history.pop()
  renderQ()
}

// ── SCORE ────────────────────────────────────────────────────
// Resultado: VERMELHO / AMARELO / VERDE
function calcScore() {
  const r  = answers.regime        || ''
  const vp = answers.vende_para    || ''
  const sg = answers.segmento      || ''
  const mg = answers.margem        || ''
  const ct = answers.contratos     || ''
  const cl = answers.clausula      || ''
  const ls = answers.limite_simples|| ''
  const ib = answers.ibs_simples   || ''
  const cf = answers.cliente_fiscal|| ''
  const co = answers.contador      || ''
  const ci = answers.compras_insumos||''

  // ── REGRAS AUTOMÁTICAS VERMELHO ──────────────────────────
  // 1. Lucro Presumido ou Real → vermelho direto
  if (['lucro_presumido','lucro_real'].includes(r)) return { resultado:'VERMELHO', pct:90 }

  // 2. Indústria/atacado/B2B com margem apertada → vermelho
  if (['industria','atacado'].includes(sg) && ['pj','pj_grande'].includes(vp) && mg === 'sim') return { resultado:'VERMELHO', pct:85 }

  // 3. Contratos longos sem cláusula de reequilíbrio e vende para CNPJ
  if (['sim_medio','sim_longo'].includes(ct) && ['nao','nao_sei'].includes(cl) && ['pj','pj_grande'].includes(vp)) return { resultado:'VERMELHO', pct:80 }

  // 4. Próximo do limite do Simples sem simulação
  if (['proximo_36','proximo_48'].includes(ls) && ['ainda_nao','nem_sabia'].includes(ib)) return { resultado:'VERMELHO', pct:80 }

  // ── REGRAS AUTOMÁTICAS AMARELO (mínimo) ──────────────────
  let amarelo = false

  // Simples vendendo para CNPJ → amarelo
  if (r === 'simples' && ['pj','pj_grande'].includes(vp)) amarelo = true

  // Clientes FREQUENTEMENTE pedem crédito fiscal
  if (cf === 'frequente') amarelo = true

  // Simples + não sabe sobre IBS/CBS + vende para CNPJ
  if (r === 'simples' && ['ainda_nao','nem_sabia'].includes(ib) && ['pj','pj_grande'].includes(vp)) amarelo = true

  // Contratos médios/longos com CNPJ sem cláusula
  if (['pj','pj_grande'].includes(vp) && ['nao','nao_sei'].includes(cl) && ['sim_medio','sim_longo'].includes(ct)) amarelo = true

  // Compras = grande parte do custo + vende para CNPJ
  if (ci === 'grande_parte' && ['pj','pj_grande'].includes(vp)) amarelo = true

  // Segmento B2B ou indústria vendendo para CNPJ
  if (['servico_pj','industria','atacado'].includes(sg) && ['pj','pj_grande'].includes(vp)) amarelo = true

  // Próximo dos limites do Simples
  if (['proximo_36','proximo_48'].includes(ls)) amarelo = true

  if (amarelo) return { resultado:'AMARELO', pct:50 }

  // ── VERDE ────────────────────────────────────────────────
  return { resultado:'VERDE', pct:15 }
}

// ── DIAGNÓSTICO LOCAL (fallback sem IA) ──────────────────────
function diagLocal(resultado) {
  const textos = {
    VERDE: {
      resumo: `${userData.empresa} tem baixo impacto imediato com a Reforma Tributária.`,
      diagnostico: `Sua empresa tende a ter baixo impacto imediato com a Reforma Tributária. Esse resultado é comum em MEIs e empresas do Simples Nacional que vendem principalmente para consumidor final pessoa física, têm operação simples, não dependem de créditos tributários e não possuem contratos longos com empresas.\n\nMesmo assim, é importante acompanhar as mudanças, manter o cadastro fiscal em ordem e conversar com o contador antes de 2027, principalmente se a empresa crescer, passar a vender para CNPJ ou mudar seu modelo de negócio.\n\nOrientação: acompanhe as novidades e revise o tema com seu contador ou com o Sebrae ao menos uma vez por ano.`
    },
    AMARELO: {
      resumo: `${userData.empresa} precisa simular cenários antes dos prazos de 2026/2027.`,
      diagnostico: `Sua empresa pode ser afetada pela Reforma Tributária, especialmente se vende para CNPJ, possui contratos, está crescendo, tem compras relevantes de mercadorias/insumos/serviços ou está avaliando permanecer no Simples Nacional.\n\nO ponto principal é avaliar se continuará no Simples Nacional com IBS/CBS dentro da guia única ou se fará sentido optar pelo recolhimento de IBS/CBS pelo regime regular. Essa escolha pode influenciar preço, crédito para clientes e competitividade.\n\nOrientação: procure a consultoria express do Sebrae ou seu contador e faça uma simulação antes dos prazos de opção de setembro de 2026.`
    },
    VERMELHO: {
      resumo: `${userData.empresa} tem impacto direto provável — simulação tributária urgente.`,
      diagnostico: `Sua empresa tem características que indicam risco alto de impacto direto com a Reforma Tributária. Esse resultado ocorre em empresas no Lucro Presumido ou Lucro Real, empresas que vendem para CNPJ, indústrias, atacadistas, distribuidoras, comércios B2B, empresas com margens apertadas, contratos longos ou próximas dos limites do Simples Nacional.\n\nNesses casos, a Reforma pode afetar preço, crédito tributário, contratos, margem, competitividade e escolha do regime tributário. A decisão não deve ser tomada apenas olhando o valor atual do imposto.\n\nOrientação: faça uma simulação tributária completa com contador ou consultoria do Sebrae especializada o quanto antes.`
    }
  }
  return textos[resultado] || textos.AMARELO
}

// ── FINISH ───────────────────────────────────────────────────
window.finish = async () => {
  const { resultado, pct } = calcScore()
  const urgencia = resultado  // VERMELHO/AMARELO/VERDE mapeado para DB como ALTO/MEDIO/BAIXO
  const urgDB = resultado === 'VERMELHO' ? 'ALTO' : resultado === 'AMARELO' ? 'MEDIO' : 'BAIXO'

  document.getElementById('prog').style.width = '100%'
  document.getElementById('step-label').textContent = 'Gerando diagnóstico…'
  document.getElementById('step-count').textContent = ''
  document.getElementById('form-area').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <strong>Analisando suas respostas…</strong>
      <p>Isso leva alguns segundos</p>
    </div>`

  // Monta contexto para IA
  const respostasTexto = STEPS.filter(s => answers[s.id]).map(s => {
    const opt = s.opts.find(o => o.v === answers[s.id])
    return `- ${s.label}: ${opt ? opt.t : answers[s.id]}`
  }).join('\n')

  const prompt = `Você é especialista em reforma tributária brasileira (EC 132/2023, LC 214/2025, CGSN 186/2026).
Contexto: evento do Sebrae — linguagem direta e acessível para donos de empresa, sem juridiquês.

Empresa: ${userData.empresa} (${userData.nome})
Resultado do diagnóstico: ${resultado}
Respostas: ${respostasTexto}

REGRAS DE CLASSIFICAÇÃO (aplique com rigor):
- VERMELHO automático: Lucro Presumido, Lucro Real, indústria/atacado B2B com margem apertada, contratos longos sem cláusula de reequilíbrio vendendo para CNPJ, próximo dos limites do Simples sem simulação.
- AMARELO automático: Simples vendendo para CNPJ, clientes que avaliam crédito tributário, sem saber se fica no Simples em 2027, contratos com CNPJ sem cláusula, compras relevantes de insumos/mercadorias.
- VERDE: MEI ou Simples vendendo para pessoa física, operação simples, sem contratos longos com CNPJ.

O resultado já foi calculado como ${resultado}. Escreva um diagnóstico personalizado com EXATAMENTE 3 parágrafos curtos (máximo 3 linhas cada):
1. Por que essa empresa específica está nesse resultado, com base nas respostas dela
2. O que ela deve fazer agora (proporcional ao resultado: Verde=acompanhar, Amarelo=simular, Vermelho=agir urgente)
3. Datas e prazos relevantes: opção IBS/CBS no Simples: setembro/2026; CBS começa: 2027

Orientação final deve mencionar o Sebrae como apoio.
Responda SOMENTE com JSON válido:
{"resumo":"veredito em 1 linha direta","diagnostico":"par1\\n\\npar2\\n\\npar3"}`

  let parsed
  try {
    // Tenta função serverless (Vercel)
    try {
      const r = await fetch('/api/diagnostico', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ prompt })
      })
      if (r.ok) parsed = await r.json()
    } catch(_) {}

    // Fallback: chama Anthropic direto
    if (!parsed) {
      const r2 = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 800,
          messages: [{ role:'user', content: prompt }]
        })
      })
      if (r2.ok) {
        const d = await r2.json()
        const t = d.content?.map(i=>i.text||'').join('') || ''
        parsed = JSON.parse(t.replace(/```json|```/g,'').trim())
      }
    }
  } catch(_) {}

  // Fallback local sem IA
  if (!parsed) parsed = diagLocal(resultado)

  // Salva no Supabase
  const rOpt = STEPS.find(s=>s.id==='regime')?.opts?.find(o=>o.v===answers.regime)
  const sgOpt= STEPS.find(s=>s.id==='segmento')?.opts?.find(o=>o.v===answers.segmento)
  const vpOpt= STEPS.find(s=>s.id==='vende_para')?.opts?.find(o=>o.v===answers.vende_para)

  const { error: dbErr } = await supabase.from('diagnosticos').insert({
    nome:        userData.nome,
    empresa:     userData.empresa,
    contato:     userData.contato,
    urgencia:    urgDB,
    score_total: pct,
    resumo:      parsed.resumo,
    diagnostico: parsed.diagnostico,
    regime:      rOpt?.t  || answers.regime,
    faturamento: vpOpt?.t || answers.vende_para,
    setor:       sgOpt?.t || answers.segmento,
    respostas:   answers,
  })
  if (dbErr) console.error('Supabase:', dbErr)

  // Renderiza resultado
  const cores = {
    VERMELHO: { emoji:'🔴', label:'Vermelho — Impacto direto provável',    css:'ALTO'  },
    AMARELO:  { emoji:'🟡', label:'Amarelo — Atenção: simule cenários',    css:'MEDIO' },
    VERDE:    { emoji:'🟢', label:'Verde — Baixo impacto imediato',        css:'BAIXO' },
  }
  const cor = cores[resultado] || cores.AMARELO

  document.getElementById('form-area').innerHTML = `
    ${!dbErr ? '<div class="saved-ok"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg> Diagnóstico salvo com sucesso</div>' : ''}
    <div class="veredito ${cor.css}">
      <div class="veredito-emoji">${cor.emoji}</div>
      <div class="veredito-nivel">${cor.label}</div>
      <div class="veredito-resumo">${parsed.resumo}</div>
    </div>
    <div class="diag-titulo">Análise detalhada</div>
    <div class="diag-texto">${parsed.diagnostico}</div>
    <button class="btn-restart" onclick="location.reload()">↺ Fazer novo diagnóstico</button>
  `
}

// ── INIT ─────────────────────────────────────────────────────
renderDados()
</script>
